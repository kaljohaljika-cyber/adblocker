name: Update Ad Blocking list

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/update-adblock-list.yml"
      - "public/**"
      - "tools/adblock/build_blocklist.py"
  schedule:
    - cron: "23 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: adblock-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Download upstream adblock lists
        run: |
          mkdir -p .adblock-input public/adblock
          curl --fail --silent --show-error --location \
            --proto '=https' --proto-redir '=https' \
            --connect-timeout 10 --max-time 45 --max-filesize 20971520 \
            https://raw.githubusercontent.com/AdAway/adaway.github.io/master/hosts.txt \
            --output .adblock-input/adaway.txt
          curl --fail --silent --show-error --location \
            --proto '=https' --proto-redir '=https' \
            --connect-timeout 10 --max-time 45 --max-filesize 20971520 \
            'https://pgl.yoyo.org/adservers/serverlist.php?hostformat=hosts&showintro=0&mimetype=plaintext' \
            --output .adblock-input/yoyo.txt
          curl --fail --silent --show-error --location \
            --proto '=https' --proto-redir '=https' \
            --connect-timeout 10 --max-time 45 --max-filesize 20971520 \
            https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts \
            --output .adblock-input/stevenblack.txt
          curl --fail --silent --show-error --location \
            --proto '=https' --proto-redir '=https' \
            --connect-timeout 10 --max-time 45 --max-filesize 20971520 \
            https://ublockorigin.github.io/uAssets/filters/filters.txt \
            --output .adblock-input/ublock-filters.txt
          curl --fail --silent --show-error --location \
            --proto '=https' --proto-redir '=https' \
            --connect-timeout 10 --max-time 45 --max-filesize 20971520 \
            https://ublockorigin.github.io/uAssets/filters/badware.txt \
            --output .adblock-input/ublock-badware.txt
          curl --fail --silent --show-error --location \
            --proto '=https' --proto-redir '=https' \
            --connect-timeout 10 --max-time 45 --max-filesize 20971520 \
            https://ublockorigin.github.io/uAssets/filters/privacy.txt \
            --output .adblock-input/ublock-privacy.txt
          curl --fail --silent --show-error --location \
            --proto '=https' --proto-redir '=https' \
            --connect-timeout 10 --max-time 45 --max-filesize 20971520 \
            https://ublockorigin.github.io/uAssets/filters/quick-fixes.txt \
            --output .adblock-input/ublock-quick-fixes.txt
          curl --fail --silent --show-error --location \
            --proto '=https' --proto-redir '=https' \
            --connect-timeout 10 --max-time 45 --max-filesize 20971520 \
            https://ublockorigin.github.io/uAssets/filters/resource-abuse.txt \
            --output .adblock-input/ublock-resource-abuse.txt
          curl --fail --silent --show-error --location \
            --proto '=https' --proto-redir '=https' \
            --connect-timeout 10 --max-time 45 --max-filesize 20971520 \
            https://easylist.to/easylist/easylist.txt \
            --output .adblock-input/easylist.txt
          curl --fail --silent --show-error --location \
            --proto '=https' --proto-redir '=https' \
            --connect-timeout 10 --max-time 45 --max-filesize 20971520 \
            https://easylist.to/easylist/easyprivacy.txt \
            --output .adblock-input/easyprivacy.txt
      - name: Validate and build compact artifact
        run: |
          python tools/adblock/build_blocklist.py \
            .adblock-input public/adblock \
            --min-domains 1000 --max-domains 250000
      - name: Publish GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Deploy static blocklist
        id: deployment
        uses: actions/deploy-pages@v4

  publish-apk-release:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Extract APK from deployment history
        run: |
          git show 1ff6d75c783f6e30ea7894a0f8b839396db1d274:public/client-updates/android/0x-VPN-v1.1.apk > 0x-VPN-v1.1.apk
          echo "b9d167f852fcf3be3b61e96b0e29ad55328c1efcc137d48965fbfaf844215ae0  0x-VPN-v1.1.apk" | sha256sum --check -
      - name: Publish GitHub Release asset
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: android-v1.1.0-preview
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" 0x-VPN-v1.1.apk --clobber
          else
            gh release create "$TAG" 0x-VPN-v1.1.apk \
              --title "0x VPN Android 1.1.0 Preview" \
              --notes "Direct APK build for 0x VPN Android 1.1.0-preview." \
              --latest
          fi
